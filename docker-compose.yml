services:
  app:
    container_name: admin-app
    image: ${APP_IMAGE:-ghcr.io/starter-kit-fe/admin:latest}
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      args:
        VERSION: ${IMAGE_TAG:-dev}
        COMMIT: ${IMAGE_COMMIT:-local}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DB_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://:${POSTGRES_PASSWORD}@redis:6379/0
    ports:
      - "${APP_PORT:-27507}:27507"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    container_name: admin-postgers
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
    shm_size: "256mb"
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
      -c wal_compression=on
      -c synchronous_commit=on
      -c max_wal_size=2GB
      -c min_wal_size=256MB
      -c checkpoint_timeout=10min
      -c checkpoint_completion_target=0.9
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c max_worker_processes=4
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
      -c max_parallel_maintenance_workers=2
      -c jit=off
    networks:
      default:
        aliases:
          - db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    stop_grace_period: 1m

  redis:
    container_name: admin-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
      --maxmemory ${REDIS_MAXMEMORY:-512mb}
      --maxmemory-policy volatile-lru
      --tcp-keepalive 300
      --requirepass "${POSTGRES_PASSWORD}"
      --notify-keyspace-events KEA
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${POSTGRES_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    stop_grace_period: 30s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# 启动（必须传入以下变量）:
#   POSTGRES_USER=admin POSTGRES_DB=admin POSTGRES_PASSWORD=xxx IMAGE_TAG=v1.0 docker compose up -d
#
# 仅启动基础设施:
#   POSTGRES_USER=admin POSTGRES_DB=admin POSTGRES_PASSWORD=xxx docker compose up -d postgres redis
