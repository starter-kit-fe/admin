services:
  app:
    container_name: admin-app
    image: ${APP_IMAGE:-ghcr.io/starter-kit-fe/admin:latest}
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      args:
        VERSION: ${IMAGE_TAG:-dev}
        COMMIT: ${IMAGE_COMMIT:-local}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DB_URL: ${DB_URL}
      REDIS_URL: ${REDIS_URL}
    ports:
      - "${APP_PORT:-27507}:27507"

# ── 启动方式 ──────────────────────────────────────────────────
#
# 1. 使用外部 Postgres / Redis（提供连接串即可）:
#      DB_URL=postgres://user:pass@host:5432/db \
#      REDIS_URL=redis://:pass@host:6379/0 \
#      docker compose up -d
#
#    也可以写入 .env 文件后直接运行:
#      docker compose up -d
#
# 2. 使用内置 Postgres / Redis（叠加 infra 文件）:
#      docker compose -f docker-compose.yml -f docker-compose.infra.yml up -d
#
#    指定镜像版本和密码:
#      IMAGE_TAG=v1.0 POSTGRES_PASSWORD=your_password \
#      docker compose -f docker-compose.yml -f docker-compose.infra.yml up -d
#
# 3. 仅启动基础设施（用于本地开发）:
#      POSTGRES_PASSWORD=your_password \
#      docker compose -f docker-compose.infra.yml up -d postgres redis
