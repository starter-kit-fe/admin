name: Publish Docker Images

on:
  push:
    tags:
      - "*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  VERSION: ${{ github.ref_name }}
  COMMIT: ${{ github.sha }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Compose Env
        run: cp env.docker.example .env

      - name: Normalize Image Owner
        id: meta
        run: echo "image_owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform image
        env:
          IMAGE_OWNER: ${{ steps.meta.outputs.image_owner }}
        run: |
          IMAGE_REF="${REGISTRY}/${IMAGE_OWNER}/admin"
          docker buildx bake \
            -f docker-compose.yml \
            --set "app.platform=${{ matrix.platform }}" \
            --set "app.args.VERSION=${VERSION}" \
            --set "app.args.COMMIT=${COMMIT}" \
            --set "app.tags=${IMAGE_REF}:${VERSION}-${{ matrix.suffix }}" \
            --set "app.labels.org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --set "app.cache-from=type=registry,ref=${IMAGE_REF}:buildcache-${{ matrix.suffix }}" \
            --set "app.cache-to=type=registry,ref=${IMAGE_REF}:buildcache-${{ matrix.suffix }},mode=max" \
            --push \
            app

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Normalize Image Owner
        id: meta
        run: echo "image_owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-platform manifest
        env:
          IMAGE_OWNER: ${{ steps.meta.outputs.image_owner }}
        run: |
          IMAGE_REF="${REGISTRY}/${IMAGE_OWNER}/admin"
          docker buildx imagetools create \
            --tag "${IMAGE_REF}:${VERSION}" \
            --tag "${IMAGE_REF}:latest" \
            "${IMAGE_REF}:${VERSION}-amd64" \
            "${IMAGE_REF}:${VERSION}-arm64"
