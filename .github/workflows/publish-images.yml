name: Publish Docker Images

on:
  push:
    tags:
      - "*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  VERSION: ${{ github.ref_name }}
  COMMIT: ${{ github.sha }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Compose Env
        run: cp env.docker.example .env

      - name: Normalize Image Owner
        id: meta
        run: |
          echo "image_owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "platform_pair=$(echo ${{ matrix.platform }} | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push digest
        id: build
        env:
          IMAGE_OWNER: ${{ steps.meta.outputs.image_owner }}
          PLATFORM_PAIR: ${{ steps.meta.outputs.platform_pair }}
        run: |
          IMAGE_REF="${REGISTRY}/${IMAGE_OWNER}/admin"
          docker buildx bake \
            -f docker-compose.yml \
            --set "app.platform=${{ matrix.platform }}" \
            --set "app.args.VERSION=${VERSION}" \
            --set "app.args.COMMIT=${COMMIT}" \
            --set "app.labels.org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --set "app.cache-from=type=registry,ref=${IMAGE_REF}:buildcache-${PLATFORM_PAIR}" \
            --set "app.cache-to=type=registry,ref=${IMAGE_REF}:buildcache-${PLATFORM_PAIR},mode=max" \
            --set "app.output=type=image,name=${IMAGE_REF},push-by-digest=true,name-canonical=true,push=true" \
            --metadata-file /tmp/bake-metadata.json \
            app
          echo "digest=$(jq -r '.app."containerimage.digest"' /tmp/bake-metadata.json)" >> "$GITHUB_OUTPUT"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ steps.meta.outputs.platform_pair }}
          path: /tmp/bake-metadata.json
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Normalize Image Owner
        id: meta
        run: echo "image_owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-platform manifest
        env:
          IMAGE_OWNER: ${{ steps.meta.outputs.image_owner }}
        run: |
          IMAGE_REF="${REGISTRY}/${IMAGE_OWNER}/admin"
          SOURCES=$(jq -r '.app."containerimage.digest"' /tmp/digests/*.json \
            | awk -v ref="${IMAGE_REF}" '{print ref"@"$0}')
          docker buildx imagetools create \
            --tag "${IMAGE_REF}:${VERSION}" \
            --tag "${IMAGE_REF}:latest" \
            ${SOURCES}
