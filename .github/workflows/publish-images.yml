name: Publish Docker Images

on:
  push:
    tags:
      - "*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  VERSION: ${{ github.ref_name }}
  COMMIT: ${{ github.sha }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Compose Env
        run: cp env.docker.example .env

      - name: Normalize Image Owner
        id: meta
        run: echo "image_owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push admin from docker-compose
        env:
          IMAGE_OWNER: ${{ steps.meta.outputs.image_owner }}
        run: |
          docker buildx bake \
            -f docker-compose.yml \
            --set "app.platforms=linux/amd64,linux/arm64" \
            --set "app.args.VERSION=${VERSION}" \
            --set "app.args.COMMIT=${COMMIT}" \
            --set "app.tags=${REGISTRY}/${IMAGE_OWNER}/admin:${VERSION}" \
            --set "app.tags=${REGISTRY}/${IMAGE_OWNER}/admin:latest" \
            --set "app.labels.org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --push \
            app